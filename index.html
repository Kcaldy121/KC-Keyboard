<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAudio Keyboard</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; padding: 16px; }
    .row { margin: 10px 0; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    label { display: flex; gap: 8px; align-items: center; }
    input[type="range"] { width: 220px; }
    .small { font-size: 12px; opacity: 0.75; }
  </style>
</head>

<body>
  <button id="startBtn">Start Audio</button>

  <div class="row">
    <label>Waveform:
      <select id="waveform">
        <option value="sine">sine</option>
        <option value="sawtooth">sawtooth</option>
        <option value="square">square</option>
        <option value="triangle">triangle</option>
        <option value="sample">meow</option>
      </select>
    </label>

    <label>Synth Mode:
      <select id="synthMode">
        <option value="single">Single Osc (old)</option>
        <option value="add">Additive</option>
        <option value="am">AM</option>
        <option value="fm">FM</option>
      </select>
    </label>

    <label>Safe Mode (anti-clip)
      <input id="safeMode" type="checkbox" checked>
    </label>
  </div>

  <div class="row">
    <label>Master Vol
      <input id="masterVol" type="range" min="0" max="1" step="0.01" value="0.6">
    </label>

    <label>Attack
      <input id="attack" type="range" min="0.001" max="1" step="0.001" value="0.01">
    </label>

    <label>Decay
      <input id="decay" type="range" min="0.001" max="1" step="0.001" value="0.08">
    </label>

    <label>Sustain
      <input id="sustain" type="range" min="0" max="1" step="0.01" value="0.6">
    </label>

    <label>Release
      <input id="release" type="range" min="0.001" max="2" step="0.001" value="0.18">
    </label>
  </div>

  <div class="row">
    <label>Additive Partials (3–10)
      <input id="partials" type="range" min="3" max="10" step="1" value="5">
    </label>

    <label>Mod Freq (AM/FM)
      <input id="modFreq" type="range" min="0.1" max="2000" step="0.1" value="40">
    </label>

    <label>FM Index (depth)
      <input id="fmIndex" type="range" min="0" max="1200" step="1" value="200">
    </label>
  </div>

  <div class="row">
    <label>LFO Rate
      <input id="lfoRate" type="range" min="0.1" max="20" step="0.1" value="5">
    </label>

    <label>LFO Depth (cents)
      <input id="lfoDepth" type="range" min="0" max="80" step="1" value="10">
    </label>

    <span class="small">Keys: Z S X D C V G B H N J M (and Q row) — same mapping as before</span>
  </div>

  <script src="main.js"></script>
</body>
</html>
